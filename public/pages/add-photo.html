<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Friend Snap - Add Photo</title>
<link rel="stylesheet" href="/css/global.css">
<link rel="stylesheet" href="/css/pages/add-photo.css">
</head>

<body>

<div id="header"></div>

<main class="container">

  <h2 class="page-title">Add Photo</h2>

  <div class="reminder">
    <div class="reminder-left">
      <div class="reminder-icon">❗</div>
      <div>
        <div class="reminder-title">Remember!</div>
        <div class="reminder-text">Share photos of things, not people.</div>
      </div>
    </div>
    <div class="reminder-right">
      <div class="example">🍔</div>
      <div class="example bad">👤 ❌</div>
      <button class="read-banner">🔊 Read aloud</button>
    </div>
  </div>

  <div class="add-box" id="addBox">
    <div class="camera">📷</div>
    <div class="add-title">Tap to add a photo</div>
    <input type="file" id="uploadPhotosInput" accept="image/*" multiple hidden>
    <div id="uploadGallery" class="gallery"></div>
  </div>

  <h3 class="ideas-title">Ideas for photos</h3>

  <div class="ideas">
    <div class="idea" onclick="openIdeas('animals', '🐾', 'Animals')">
      <div class="idea-icon">🐾</div>
      <div>Animals</div>
    </div>
    <div class="idea" onclick="openIdeas('food', '🍽', 'Food')">
      <div class="idea-icon">🍽</div>
      <div>Food</div>
    </div>
    <div class="idea" onclick="openIdeas('art', '🎨', 'Art')">
      <div class="idea-icon">🎨</div>
      <div>Art</div>
    </div>
    <div class="idea" onclick="openIdeas('places', '📍', 'Places')">
      <div class="idea-icon">📍</div>
      <div>Places</div>
    </div>
  </div>

  <!-- Ideas popup -->
  <div id="ideas-popup" class="popup-overlay" style="display:none">
    <div class="popup-box">
      <div class="popup-header">
        <span id="ideas-popup-title"></span>
        <button class="popup-close" onclick="closeIdeas()">✕</button>
      </div>
      <div id="ideas-grid" class="ideas-grid"></div>
    </div>
  </div>

</main>

<div id="footer"></div>

<script src="/js/global.js"></script>
<script src="/js/pages/add-photo.js"></script>

</body>
</html>
