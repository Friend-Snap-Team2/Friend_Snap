<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Friend Snap - Add Photo</title>

<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/pages/add-photo.css">

</head>

<body>

<div id="header"></div>

<main class="container">

<h2 class="page-title">Add Photo</h2>

<div class="top-controls">
    <div class="tts-container">
        <span>Text to speech</span>
        <div class="avatar-icon">🔊</div> </div>
</div>

<!-- Reminder Banner -->

<div class="reminder">

<div class="reminder-left">
<div class="reminder-icon">❗</div>

<div>
<div class="reminder-title">Remember!</div>
<div class="reminder-text">
Share photos of things, not people.
</div>
</div>
</div>

<div class="reminder-right">
<div class="example">🍔</div>
<div class="example bad">👤 ❌</div>
<button class="read-banner">🔊 Read aloud</button>
</div>

</div>


<!-- Add Photo Box -->

<div class="add-box">

<div class="camera">📷</div>

<div class="add-title">Tap to add a photo</div>

<div class="add-buttons">

<button class="take-btn">📸 Take Photo</button>

<button class="pick-btn">🖼 Pick Photo</button>

</div>

</div>


<!-- Ideas -->

<h3 class="ideas-title">Ideas for photos</h3>

<div class="ideas">

<div class="idea">
<div class="idea-icon">🐾</div>
<div>Animals</div>
</div>

<div class="idea">
<div class="idea-icon">🍽</div>
<div>Food</div>
</div>

<div class="idea">
<div class="idea-icon">🎨</div>
<div>Art</div>
</div>

<div class="idea">
<div class="idea-icon">📍</div>
<div>Places</div>
</div>

</div>

</main>

<div id="footer"></div>

<script src="/js/global.js"></script>

</body>
</html>
