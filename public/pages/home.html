<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Friend Snap - Home</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/pages/home.css">
</head>

<body>

  <div id="header"></div>

  <main class="container">

    <h2>People You Might Like</h2>
    <p class="subtitle">
      These people like <b>similar photos</b>. Tap "Say Hello!" to go to chat.
    </p>

    <div class="cards">

      <div class="card">
        <button class="block">Block</button>
        <div class="profile">
          <div class="profile-icon">😜</div>
          <div>
            <div class="name">SazStar</div>
            <div class="likes">Likes photos of: <b>animals</b></div>
          </div>
        </div>
        <button class="hello-btn">👋 Say Hello!</button>
        <div class="hint">Tap to send a friendly hello</div>
      </div>

      <div class="card">
        <button class="block">Block</button>
        <div class="profile">
          <div class="profile-icon">🤖</div>
          <div>
            <div class="name">sad123</div>
            <div class="likes">Likes photos of: <b>gadgets</b></div>
          </div>
        </div>
        <button class="hello-btn">👋 Say Hello!</button>
        <div class="hint">Tap to send a friendly hello</div>
      </div>

    </div>

    <div class="photo-feed">
      <div class="feed-icon">🖼️</div>
      <div>
        <div class="feed-title">Photo Feed</div>
        <div class="feed-sub">See photos of things you like</div>
      </div>
    </div>

    <div class="photo-grid">
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
      <div class="photo-box"></div>
    </div>

  </main>

  <div id="footer"></div>

  <script src="/js/global.js"></script>

</body>
</html>
