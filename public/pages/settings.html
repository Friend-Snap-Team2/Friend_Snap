<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Settings</title>
  <link rel="icon" type="image/png" href="/assets/icon_placeholder.png">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/pages/settings.css">
</head>

<body>

<div id="header"></div>

<main class="container">

  <h2>Settings</h2>
  <p class="subtitle">Choose how the app looks and feels</p>

  <div class="setting-box">
    <h3>Theme</h3>
    <p class="setting-desc">Pick a colour style</p>
    <div class="setting-buttons">
      <button onclick="setTheme('light')">🌞 Light</button>
      <button onclick="setTheme('dark')">🌙 Dark</button>
      <button onclick="setTheme('high')">⚫ High Contrast</button>
    </div>
  </div>

  <div class="setting-box">
    <h3>Text Size</h3>
    <p class="setting-desc">Make text easier to read</p>
    <div class="setting-buttons">
      <button onclick="setTextSize('normal')">Normal</button>
      <button onclick="setTextSize('large')">Large</button>
    </div>
  </div>

</main>

<div id="footer"></div>

<script src="/js/global.js"></script>
<script src="/js/pages/settings.js"></script>

</body>
</html>
