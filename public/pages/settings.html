<!DOCTYPE html>
<html>
<head>
  <title>Settings</title>

<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/settings.css">

<script src="../js/settings.js" defer></script>
</head>

<body>

<div id="header"></div>

<main class="container">

  <h2>Settings</h2>
  <p class="subtitle">Choose how the app looks and feels</p>

  <!-- Theme -->
  <div class="setting-box">
    <h3>Theme</h3>
    <p class="setting-desc">Pick a colour style</p>

    <div class="setting-buttons">
      <button onclick="setTheme('light')">🌞 Light</button>
      <button onclick="setTheme('dark')">🌙 Dark</button>
      <button onclick="setTheme('high')">⚫ High Contrast</button>
    </div>
  </div>

  <!-- Text Size -->
  <div class="setting-box">
    <h3>Text Size</h3>
    <p class="setting-desc">Make text easier to read</p>

    <div class="setting-buttons">
      <button onclick="setTextSize('normal')">A Normal</button>
      <button onclick="setTextSize('large')">A Large</button>
    </div>
  </div>

</main>

<div id="footer"></div>

</body>
</html>
