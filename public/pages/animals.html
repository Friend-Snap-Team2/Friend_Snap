<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animals Gallery</title>
<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/add-photo.css">
</head>
<body>

<h2>Animals Gallery</h2>

<div id="gallery" class="gallery"></div>

<script>
const gallery = document.getElementById("gallery");

// List of image filenames
const images = [
  "images/animals/eagle.jpg",
  "images/animals/fox.jpg",
  "images/animals/koal.jpg",
  "images/animals/tiger.jpg"
];

// Populate gallery
images.forEach(name => {
  const img = document.createElement("img");
  img.src = `../images/animals/${name}`;
  img.style.width = "200px";
  img.style.height = "200px";
  img.style.objectFit = "cover";
  img.style.margin = "10px";
  img.style.borderRadius = "12px";
  gallery.appendChild(img);
});
</script>

</body>
</html>
