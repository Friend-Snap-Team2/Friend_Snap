<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Friend Snap - Chat</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/pages/chat.css">
</head>

<body>

  <div id="header"></div>

  <main class="container">

    <!-- View 1 - Friends list -->
    <div id="chat-list-view">
      <h2 class="chat-title">Messages</h2>
      <div id="chat-list"></div>
    </div>

    <!-- View 2 - Chat window (hidden by default) -->
    <div id="chat-window-view" style="display:none">

      <div class="chat-header">
        <button class="chat-back-btn" onclick="showChatList()">←</button>
        <div class="chat-user-info">
          <div class="chat-avatar">
            <img id="chatAvatar" src="" alt="avatar">
          </div>
          <div>
            <div id="chatNickname" class="chat-nickname"></div>
          </div>
        </div>
        <div class="chat-header-actions">
          <button class="chat-read-btn">🔊 Read Aloud</button>
          <button class="chat-block-btn">🚫 Block</button>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="chat-hint">
          <span>ℹ️ Say hello with a big smile! 😊</span>
        </div>
      </div>

      <div class="emoji-bar">
        <div class="emoji-btn">👍</div>
        <div class="emoji-btn">👎</div>
        <div class="emoji-btn">❤️</div>
        <div class="emoji-btn">😂</div>
        <div class="emoji-btn">😮</div>
        <div class="emoji-btn">🍔</div>
        <div class="emoji-btn">🐶</div>
      </div>

    </div>

  </main>

  <div id="footer"></div>

  <script src="/js/global.js"></script>
  <script src="/js/pages/chat.js"></script>

</body>
</html>
