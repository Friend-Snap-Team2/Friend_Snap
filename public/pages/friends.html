<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">  <title>Friend Snap - Home</title>
  <link rel="icon" type="image/png" href="/assets/icon_placeholder.png">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/pages/friends.css">

  <!-- ✅ ADDED: basic pagination styling -->
  <style>
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin-top: 15px;
    }
  </style>

  <!-- ✅ ADDED: safe fallback for pagination functions -->
  <script>
    window.nextPage = window.nextPage || function(){};
    window.prevPage = window.prevPage || function(){};
  </script>

</head>

<body>

  <div id="header"></div>

  <main class="container">

    <!-- Search bar -->
    <div class="friends-search">
      <input type="text" id="friend-search" placeholder="Search users..." />
    </div>

    <!-- Tabs -->
    <div class="friends-tabs">
      <button class="tab active" onclick="showTab('suggestions')">Suggestions</button>
      <button class="tab" onclick="showTab('friends')">My Friends</button>
    </div>

    <!-- Suggestions tab content -->
    <div id="suggestions" class="tab-content">
      <!-- Content will be dynamically rendered by friends.js -->
    </div>

      <!-- Suggestions pagination -->
    <div id="suggestions-pagination" class="pagination">
      <button onclick="prevPage('suggestions')">⬅</button>
      <span id="suggestions-pages"></span>
      <button onclick="nextPage('suggestions')">➡</button>
    </div>
   

    <!-- My Friends tab content -->
    <div id="friends" class="tab-content" style="display:none">
      <!-- Content will be dynamically rendered by friends.js -->
    </div>

    <div id="friends-pagination" class="pagination" style="display:none;">
      <button onclick="prevPage('friends')">⬅</button>
      <span id="friends-pages"></span>
      <button onclick="nextPage('friends')">➡</button>
    </div>

  </main>

  <div id="footer"></div>
  
  <script src="/js/global.js"></script>
  <script src="/js/pages/friends.js"></script>

  <!-- ✅ ADDED: controls pagination visibility on tab switch -->
  <script>
    function showTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(tab => {
        tab.style.display = 'none';
      });

      document.querySelectorAll('.tab').forEach(btn => {
        btn.classList.remove('active');
      });

      document.getElementById(tabName).style.display = 'block';
      event.target.classList.add('active');

      const suggestionsPag = document.getElementById('suggestions-pagination');
      const friendsPag = document.getElementById('friends-pagination');

      if (suggestionsPag && friendsPag) {
        suggestionsPag.style.display = (tabName === 'suggestions') ? 'flex' : 'none';
        friendsPag.style.display = (tabName === 'friends') ? 'flex' : 'none';
      }
    }
  </script>

</body>
</html>
