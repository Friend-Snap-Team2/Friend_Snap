<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Friend Snap - Home</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/pages/friends.css">
</head>

<body>

  <div id="header"></div>

  <main class="container">

    <div class="friends-header">
      <h1>Friends</h1>

      <div class="header-actions">
        <button class="refresh">⟳</button>
        <button class="listen">🔊 Listen</button>
      </div>
    </div>


    <div class="friends-tabs">
      <button class="tab active">Suggestions</button>
      <button class="tab">My Friends (0)</button>
    </div>



    <div class="friend-card">

      <div class="friend-top">

        <div class="friend-info">
          <div class="friend-avatar">😜</div>
          <div class="friend-name">SazStar</div>
        </div>

        <img class="friend-photo" src="photo1.jpg">

      </div>

      <button class="comment-btn">
        <span class="bubble">1</span>
        Comment on Picture
        <span class="once">ONCE ONLY</span>
      </button>

    </div>



    <div class="friend-card">

      <div class="friend-top">

        <div class="friend-info">
          <div class="friend-avatar gray">🤖</div>
          <div class="friend-name">sad123</div>
        </div>

        <img class="friend-photo" src="photo2.jpg">

      </div>

      <button class="comment-btn">
        <span class="bubble">1</span>
        Comment on Picture
        <span class="once">ONCE ONLY</span>
      </button>

    </div>



    <div class="friend-card">
      <div class="friend-top">

        <div class="friend-info">
          <div class="friend-avatar pink">🤖</div>
          <div class="friend-name">zxc</div>
        </div>

        <img class="friend-photo" src="photo3.jpg">
        
      </div>

      <button class="comment-btn">
        <span class="bubble">1</span>
        Comment on Picture
        <span class="once">ONCE ONLY</span>
      </button>

    </div>

  </main>

  <div id="footer"></div>

  <script src="/js/global.js"></script>

</body>
</html>
