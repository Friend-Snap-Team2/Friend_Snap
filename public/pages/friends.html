<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Friend Snap - Home</title>
  <link rel="icon" type="image/png" href="/assets/icon_placeholder.png">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/pages/friends.css">
</head>

<body>

  <div id="header"></div>

  <main class="container">


    <div class="friends-tabs">
      <button class="tab active" onclick="showTab('suggestions')">Suggestions</button>
      <button class="tab" onclick="showTab('friends')">My Friends</button>
    </div>


    <!-- Suggestions tab content -->
    <div id="suggestions" class="tab-content">

        <h1 class="title">Add Friends</h1>

        <div class="suggest-card">

          <div class="suggest-info">
            <div class="friend-avatar">🦊</div>
            <div class="friend-name">Fast23</div>
          </div>

          <button class="suggest-add-btn">Add Friend</button>

        </div>


        <div class="suggest-card">

          <div class="suggest-info">
            <div class="friend-avatar gray">🐼</div>
            <div class="friend-name">Pat55</div>
          </div>

          <button class="suggest-add-btn">Add Friend</button>

        </div>


        <div class="suggest-card">

          <div class="suggest-info">
            <div class="friend-avatar pink">🐸</div>
            <div class="friend-name">FrogFan22</div>
          </div>

          <button class="suggest-add-btn">Add Friend</button>

        </div>

    </div>

    <!-- My Friends tab content -->
    <div id="friends" class="tab-content" style="display:none">

      <h1 class="title">My Friends</h1>

      <div class="friend-card">

      <div class="friend-top">

        <div class="friend-info">
          <div class="friend-avatar">😜</div>
          <div class="friend-name">SazStar</div>
        </div>

        <img class="friend-photo" src="photo1.jpg">

      </div>

      <button class="comment-btn">
        <span class="bubble">1</span>
        Comment on Picture
        <span class="once">ONCE ONLY</span>
      </button>

    </div>



    <div class="friend-card">

      <div class="friend-top">

        <div class="friend-info">
          <div class="friend-avatar gray">🤖</div>
          <div class="friend-name">sad123</div>
        </div>

        <img class="friend-photo" src="photo2.jpg">

      </div>

      <button class="comment-btn">
        <span class="bubble">1</span>
        Comment on Picture
        <span class="once">ONCE ONLY</span>
      </button>

    </div>



    <div class="friend-card">
      <div class="friend-top">

        <div class="friend-info">
          <div class="friend-avatar pink">🤖</div>
          <div class="friend-name">zxc</div>
        </div>

        <img class="friend-photo" src="photo3.jpg">
        
      </div>

      <a class="comment-btn" href="chat.html">
        <span class="bubble">1</span>
        chat
        <span class="once">ONCE ONLY</span>
      </a>

    </div>
    </div>

  </main>

  <div id="footer"></div>

  <script src="/js/global.js"></script>
  <script src="/js/pages/friends.js"></script>

</body>
</html>
